name: Deploy to Sealos

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/location-tracking:latest
      
      - name: Deploy to Sealos
        uses: lovon/ sealos-deploy@v1
        with:
          sealos_token: ${{ secrets.SEALOS_TOKEN }}
          sealos_cmd: "sealos run ghcr.io/labring/fastglab/location-tracking:latest --port 8080"
