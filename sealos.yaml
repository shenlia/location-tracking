apiVersion: apps.sealos.io/v1
kind: App
metadata:
  name: location-tracking
  annotations:
    description: "Location Tracking Shortlink Service"
spec:
  replicas: 1
  containers:
    - name: track
      image: your-dockerhub-username/location-tracking:latest
      ports:
        - port: 8080
          targetPort: 8080
      resources:
        cpu: 0.5
        memory: 512Mi
      env:
        - name: PORT
          value: "8080"
      volumeMounts:
        - name: data
          mountPath: /app/data
  volumes:
    - name: data
      emptyDir: {}
